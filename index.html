<!DOCTYPE html>
<html>
<head>
  <title>Access Verification</title>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    body {
      background:#000;
      color:#fff;
      font-family:Arial, sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box {
      border:2px solid #fff;
      padding:40px;
      border-radius:10px;
      text-align:center;
      width:320px;
    }

    .hidden {
      display:none;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Verifying...</h2>
    <p>Complete Detection To Continue.</p>

    <div id="captcha-container">
      <div class="cf-turnstile"
           data-sitekey="0x4AAAAAACi37eNCVKUDk-Tm"
           data-callback="captchaSuccess">
      </div>
    </div>

    <div id="continueSection" class="hidden">
      <p>Verification successful.</p>
      <button onclick="proceed()">ripwatari</button>
    </div>
  </div>

<script>
let verified = false;

function captchaSuccess(token) {
    verified = true;
    document.getElementById("continueSection").classList.remove("hidden");
}

function proceed() {
    if (!verified) return;

    // Store temporary access flag
    sessionStorage.setItem("access_granted", "true");

    window.location.href = "https://lscatalogue.nicepage.io/";
}
</script>

</body>
</html>
